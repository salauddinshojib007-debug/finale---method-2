  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;

    body {
      background-color: #f4f6f8;
      color: #2d3436;

    header {

      display: flex;
      justify-content: space-between;

    header h1 {
      font-size: 1.8rem;
      letter-spacing: 0.5px;
    }

    header span {
      font-size: 0.95rem;
      color: #cfd9e8;
    }

    .hero {
      background-color: #2d5d8b;
      color: #ffffff;
      text-align: center;
      padding: 60px 20px;
    }

    .hero h2 {
      font-size: 2.2rem;
      margin-bottom: 10px;
    }

    .hero p {
      font-size: 1.1rem;
      color: #e3edf7;
    }

    .container {
      max-width: 600px;
      margin: -40px auto 60px;
      background: #ffffff;
      border-radius: 10px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
      padding: 40px;
      position: relative;
    }

    .container h3 {
      margin-bottom: 5px;
      color: #1f3a5f;
    }

    .container p.subtitle {
      color: #6b7c93;
      margin-bottom: 25px;
      font-size: 0.95rem;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-weight: 600;
      font-size: 0.9rem;
      color: #34495e;
    }

    input, select {
      width: 100%;
      padding: 12px 14px;
      margin-bottom: 20px;
      border: 1px solid #d3dce6;
      border-radius: 6px;
      font-size: 1rem;
      background-color: #fafbfc;
      transition: border-color 0.2s ease;
    }

    input:focus, select:focus {
      outline: none;
      border-color: #2d5d8b;
      background-color: #ffffff;
    }

    button {
      width: 100%;
      padding: 14px;
      background-color: #2d5d8b;
      color: #ffffff;
      font-size: 1rem;
      font-weight: 600;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: background-color 0.2s ease;
    }

    button:hover {
      background-color: #1f3a5f;
    }

    footer {

  <header>
    <h1>Fix-It Pro</h1>
    <span>Appliance Repair Specialists</span>
  </header>

  <section class="hero">
    <h2>Fast, Reliable Appliance Repairs</h2>
    <p>Request a service appointment and we'll get back to you within 24 hours.</p>
  </section>

  <div class="container">
    <h3>Request a Repair</h3>
    <p class="subtitle">Fill out the form below and our team will reach out to schedule your repair.</p>

    <form action="thank-you.html" method="get">
      <label for="fullName">Full Name</label>
      <input type="text" id="fullName" name="fullName" placeholder="Jane Doe" required>

      <label for="email">Email</label>
      <input type="email" id="email" name="email" placeholder="jane@example.com" required>

      <label for="applianceType">Appliance Type</label>
      <select id="applianceType" name="applianceType" required>
        <option value="" disabled selected>Select an appliance</option>
        <option value="refrigerator">Refrigerator</option>
        <option value="washer">Washing Machine</option>
        <option value="dryer">Dryer</option>
        <option value="dishwasher">Dishwasher</option>
        <option value="oven">Oven / Stove</option>
        <option value="microwave">Microwave</option>
        <option value="other">Other</option>
      </select>

      <button type="submit">Submit Request</button>
    </form>
  </div>

  <footer>
    &copy; 2026 Fix-It Pro. All rights reserved.
  </footer>
